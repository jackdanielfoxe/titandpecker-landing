<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tit & Pecker</title>
  <meta name="description" content="An exclusive members club." />
  <meta name="robots" content="noindex" />

  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png" />
  <link rel="apple-touch-icon" sizes="180x180" href="/favicon-180.png" />
  <link rel="shortcut icon" href="/favicon.ico" />

  <style>
    @font-face {
      font-family: 'Big Caslon';
      src: url('/fonts/BigCaslon.ttf') format('truetype');
      font-weight: normal;
      font-style: normal;
      font-display: swap;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      background: #000;
    }

    .hero {
      position: relative;
      width: 100%;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 24px;
      overflow: hidden;
    }

    .hero__bg {
      position: absolute;
      inset: 0;
      background-image: url('/bar.jpg');
      background-size: cover;
      background-position: center;
      filter: brightness(0.45);
      z-index: 0;
    }

    .hero__content {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
    }

    .hero__logo {
      width: 80px;
      height: auto;
      margin-bottom: 8px;
    }

    .hero__eyebrow {
      font-family: 'Big Caslon', Georgia, serif;
      font-size: clamp(18px, 3vw, 28px);
      color: #CDA065;
      font-weight: 400;
      letter-spacing: 0.02em;
    }

    .hero__title {
      font-family: 'Big Caslon', Georgia, serif;
      font-size: clamp(56px, 10vw, 120px);
      color: #FFFFFF;
      font-weight: 400;
      letter-spacing: -0.01em;
      line-height: 1;
    }

    .hero__btn {
      display: inline-block;
      margin-top: 16px;
      padding: 18px 40px;
      background: #135178;
      color: #FFFFFF;
      font-family: 'Big Caslon', Georgia, serif;
      font-size: clamp(16px, 2vw, 20px);
      font-weight: 400;
      letter-spacing: 0.02em;
      text-decoration: none;
      border: none;
      cursor: pointer;
      transition: background 0.2s ease;
    }

    .hero__btn:hover {
      background: #0e3d5a;
    }
  </style>
</head>
<body>
  <section class="hero">
    <div class="hero__bg"></div>
    <div class="hero__content">
      <img src="/tp-logo.png" alt="Tit & Pecker" class="hero__logo" />
      <p class="hero__eyebrow">Welcome to the</p>
      <h1 class="hero__title">Tit &amp; Pecker</h1>
      <a href="/apply.html" class="hero__btn">Apply to become a Member</a>
    </div>
  </section>
</body>
</html>
