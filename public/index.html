<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tit & Pecker</title>
  <meta name="description" content="Tit & Pecker — your local pub." />

  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png" />
  <link rel="apple-touch-icon" sizes="180x180" href="/favicon-180.png" />
  <link rel="shortcut icon" href="/favicon.ico" />

  <style>
    @font-face {
      font-family: 'Big Caslon';
      src: url('/fonts/BigCaslon.ttf') format('truetype');
      font-weight: normal;
      font-style: normal;
      font-display: swap;
    }

    :root {
      --color-bg: #FAF9F7;
      --color-ink: #182B39;
      --color-deep-blue: #135178;
      --color-sky: #A4D6F7;
      --color-tan: #CDA065;
      --color-brown: #784E12;
      --color-red: #D02627;
      --font-display: 'Big Caslon', 'Times New Roman', Georgia, serif;
      --font-body: 'Segoe UI', system-ui, sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      height: 100%;
      margin: 0;
    }

    body {
      background: var(--color-bg);
      color: var(--color-ink);
      font-family: var(--font-body);
      -webkit-font-smoothing: antialiased;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 32px 20px;
      text-align: center;
    }

    .logo {
      width: 120px;
      height: auto;
      margin-bottom: 24px;
    }

    .eyebrow {
      margin: 0 0 6px;
      font-size: 13px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--color-tan);
      font-weight: 700;
    }

    h1 {
      margin: 0 0 12px;
      font-family: var(--font-display);
      font-weight: 400;
      font-size: clamp(40px, 8vw, 64px);
      letter-spacing: 0.01em;
      color: var(--color-ink);
    }

    p.tagline {
      margin: 0 0 36px;
      font-size: 16px;
      color: var(--color-ink);
      opacity: 0.7;
      max-width: 420px;
    }

    .actions {
      display: flex;
      flex-direction: column;
      gap: 14px;
      width: 100%;
      max-width: 320px;
    }

    .btn {
      display: inline-block;
      padding: 16px 24px;
      border-radius: 14px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      font-size: 14px;
      text-decoration: none;
      transition: opacity 0.15s ease;
    }

    .btn:active {
      opacity: 0.85;
    }

    .btn--primary {
      background: var(--color-deep-blue);
      color: #FFFFFF;
    }

    .btn--secondary {
      background: transparent;
      color: var(--color-ink);
      border: 1px solid var(--color-ink);
      opacity: 0.6;
    }

    footer {
      margin-top: 56px;
      font-size: 12px;
      opacity: 0.4;
    }
  </style>
</head>
<body>
  <img src="/tp-logo.png" alt="Tit & Pecker logo" class="logo" />

  <p class="eyebrow">Welcome to</p>
  <h1>Tit &amp; Pecker</h1>
  <p class="tagline">Your local. Good pints, good people.</p>

  <div class="actions">
    <a href="/drink-tracker" class="btn btn--primary">Drink Tracker</a>
  </div>

  <footer>&copy; Tit &amp; Pecker</footer>
</body>
</html>
