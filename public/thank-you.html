<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Application Received — Tit & Pecker</title>
  <meta name="robots" content="noindex" />

  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
  <link rel="shortcut icon" href="/favicon.ico" />

  <style>
    @font-face {
      font-family: 'Big Caslon';
      src: url('/fonts/BigCaslon.ttf') format('truetype');
      font-weight: normal;
      font-style: normal;
      font-display: swap;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --ink: #182B39;
      --deep-blue: #135178;
      --tan: #CDA065;
      --bg: #FAF9F7;
    }

    body {
      background: var(--bg);
      color: var(--ink);
      font-family: 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 48px 20px;
      text-align: center;
      -webkit-font-smoothing: antialiased;
    }

    img.logo {
      width: 64px;
      margin-bottom: 24px;
    }

    .eyebrow {
      font-size: 12px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--tan);
      font-weight: 700;
      margin-bottom: 10px;
    }

    h1 {
      font-family: 'Big Caslon', Georgia, serif;
      font-size: clamp(28px, 5vw, 44px);
      font-weight: 400;
      margin-bottom: 14px;
    }

    p {
      font-size: 15px;
      opacity: 0.65;
      line-height: 1.6;
      max-width: 420px;
      margin-bottom: 28px;
    }

    a.home-link {
      color: var(--deep-blue);
      text-decoration: none;
      font-size: 14px;
      font-weight: 600;
    }

    a.home-link:hover { text-decoration: underline; }
  </style>
</head>
<body>

  <img src="/tp-logo.png" alt="Tit & Pecker logo" class="logo" />
  <p class="eyebrow">Membership Application</p>
  <h1>Application received.</h1>
  <p>Thank you for applying. Membership is considered carefully — we'll be in touch if you make the cut.</p>
  <a href="/" class="home-link">← Back to home</a>

</body>
</html>
